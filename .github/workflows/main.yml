name: Ultimate_Structural_Fixer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Recursive Normalization Extraction
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function main() {
            let finalNodes = [];
            let proxyNames = [];

            for (const url of urls) {
              try {
                const data = await new Promise((res, rej) => {
                  https.get(url, { timeout: 15000 }, (r) => {
                    let d = '';
                    r.on('data', (c) => d += c);
                    r.on('end', () => res(d));
                  }).on('error', rej);
                });

                if (!data) continue;
                const lines = data.split('\n');
                let inArea = false;

                for (let line of lines) {
                  const trimmed = line.trim();
                  
                  // 1. 发现 proxies 段开始，开启抓取，但不搬运这一行
                  if (trimmed.toLowerCase().startsWith('proxies:')) {
                    inArea = true;
                    continue;
                  }

                  if (inArea) {
                    // 2. 判定段落结束（遇到非缩进且非杠开头的顶级键）
                    if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                      inArea = false;
                      continue;
                    }

                    // 3. 核心修复：剔除多余的标题行，并强制标准化缩进
                    if (trimmed.length > 0 && !trimmed.toLowerCase().includes('proxies:')) {
                      if (trimmed.startsWith('-')) {
                        finalNodes.push('  ' + trimmed); // 节点开头，强制 2 空格
                      } else {
                        finalNodes.push('    ' + trimmed); // 节点属性，强制 4 空格
                      }

                      // 提取节点名用于组，确保不带引号干扰
                      const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                      if (nameMatch) {
                        let n = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                        if (n) proxyNames.push(`      - "${n}"`);
                      }
                    }
                  }
                }
              } catch (e) { console.log(`Skipping: ${url}`); }
            }

            const uniqueNames = [...new Set(proxyNames)];
            const output = [
              "allow-left-click: true",
              "mode: rule",
              "unified-delay: true",
              "",
              "proxies:", // 全局唯一标题
              ...finalNodes,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', output);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Fix: Normalized structure and single-key" || exit 0
          git push origin HEAD
