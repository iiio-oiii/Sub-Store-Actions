name: Absolute_Standard_Merger_Final

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Atomic Content Reconstruction
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function main() {
            let cleanNodes = [];
            let nodeNames = new Set();

            for (const url of urls) {
              try {
                const data = await new Promise((res, rej) => {
                  https.get(url, { timeout: 15000 }, (r) => {
                    let d = '';
                    r.on('data', (c) => d += c);
                    r.on('end', () => res(d));
                  }).on('error', rej);
                });

                if (!data) continue;
                const lines = data.split('\n');
                let inProxies = false;

                for (let line of lines) {
                  const trimmed = line.trim();
                  if (trimmed.toLowerCase().startsWith('proxies:')) { inProxies = true; continue; }
                  
                  if (inProxies) {
                    if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) { inProxies = false; continue; }
                    
                    if (trimmed.length > 0 && !trimmed.toLowerCase().includes('proxies:')) {
                      // 1. 物理对齐：确保每一行都有正确的 2/4 缩进
                      const formatted = trimmed.startsWith('-') ? '  ' + trimmed : '    ' + trimmed;
                      cleanNodes.push(formatted);

                      // 2. 提取并清理节点名：处理引号，确保纯净
                      const nameMatch = line.match(/name:\s*(.+)/);
                      if (nameMatch) {
                        let n = nameMatch[1].split(',')[0].trim(); // 处理后面带逗号的情况
                        n = n.replace(/^["']|["']$/g, ''); // 去掉包裹的引号
                        if (n) nodeNames.add(n);
                      }
                    }
                  }
                }
              } catch (e) { console.log(`Error: ${url}`); }
            }

            // 3. 强制对所有节点名使用单引号包裹，防止特殊字符引发 YAML 解析错误
            const proxyList = Array.from(nodeNames).map(n => `      - '${n}'`).join('\n');
            
            const finalYaml = [
              "allow-left-click: true",
              "mode: rule",
              "unified-delay: true",
              "proxies:",
              ...cleanNodes,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              proxyList,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              proxyList,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Auto: Fix naming and escaping" || exit 0
          git push origin HEAD
