name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG)/i;
          const excludeRegex = /(美国|US|Japan|日本|Singapore|新加坡|Taiwan|台湾|DIRECT|REJECT)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log("🚀 启动深度清理与格式化...");
              let finalNodes = new Set();

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;

                  // 匹配所有以 - 开头的节点块
                  const items = content.split(/\n\s*-/);
                  
                  items.forEach(item => {
                      // 严格过滤：必须含香港，绝不含美国等
                      if (hkRegex.test(item) && !excludeRegex.test(item)) {
                          // 提取关键字段
                          const nameMatch = item.match(/name:\s*"?([^",\n}]+)"?/);
                          const serverMatch = item.match(/server:\s*([^,\n}]+)/);
                          const portMatch = item.match(/port:\s*([^,\n}]+)/);

                          if (nameMatch && serverMatch && portMatch) {
                              // 核心逻辑：强行清理所有换行和垃圾字符，压成标准单行并套上大括号
                              let clean = item.split('proxy-groups:')[0] // 切掉尾随垃圾
                                  .replace(/^[-\s]+/, '')             // 去掉开头横杠
                                  .replace(/\r?\n/g, ', ')            // 换行变逗号
                                  .replace(/,\s*,/g, ',')             // 清理双逗号
                                  .trim();

                              // 如果不是大括号开头，强行补上
                              if (!clean.startsWith('{')) clean = `{${clean}}`;
                              
                              finalNodes.add(`  - ${clean}`);
                          }
                      }
                  });
              }

              const output = "proxies:\n" + Array.from(finalNodes).join('\n');
              fs.writeFileSync('hk_pure.yaml', output);
              console.log(`✅ 过滤完成！得到 ${finalNodes.size} 个标准香港节点。`);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
