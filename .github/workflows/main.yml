name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时全自动运行一次
  workflow_dispatch:      # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 赋予 Action 写入文件的权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # 1. 导出 Secret 里的 23 个订阅链接到本地文件
          printf "%s" "$SUB_LINKS" > links.txt
          
          # 2. 下载 Sub-Store 官方最新的 CLI 执行脚本 (绕过所有 npm 安装错误)
          # 我们尝试两个可能的路径以确保万无一失
          echo "--- 正在下载执行脚本 ---"
          curl -L https://raw.githubusercontent.com/sub-store-org/Sub-Store/master/cli/sub-store-cli.js -o cli.js || \
          curl -L https://raw.githubusercontent.com/sub-store-org/Sub-Store/raw/master/sub-store-cli.js -o cli.js
          
          # 3. 运行转换逻辑
          # 使用 node 直接运行下载的脚本，配合你的 process.js 过滤逻辑
          echo "--- 正在处理节点 (香港/低延迟/去重) ---"
          node cli.js convert --source links.txt --script ./process.js --output hk_pure.yaml --verbose

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 检查生成的 yaml 文件是否存在且不为空
          if [ -s "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            # 只有当文件有变动时才提交，避免 Action 报错
            git diff --quiet && git diff --staged --quiet || git commit -m "自动更新: 香港纯净节点列表"
            git push
          else
            echo "错误：未能生成有效的 hk_pure.yaml，请检查订阅源或脚本逻辑。"
            exit 1
          fi
