name: Final_Format_Master

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Atomic Structure Rebuild
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function main() {
            let allNodes = [];
            let nodeNames = new Set();

            for (const url of urls) {
              try {
                const data = await new Promise((res, rej) => {
                  https.get(url, { timeout: 15000 }, (r) => {
                    let d = '';
                    r.on('data', (c) => d += c);
                    r.on('end', () => res(d));
                  }).on('error', rej);
                });

                if (!data) continue;
                const lines = data.split('\n');
                let inProxiesSection = false;

                for (let line of lines) {
                  const trimmed = line.trim();
                  
                  // 1. 发现 proxies 段，开始抓取内容，但不搬运这一行标题
                  if (trimmed.toLowerCase().startsWith('proxies:')) {
                    inProxiesSection = true;
                    continue;
                  }

                  if (inProxiesSection) {
                    // 2. 遇到其他顶级配置，停止抓取当前文件的节点
                    if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                      inProxiesSection = false;
                      continue;
                    }

                    // 3. 剔除多余的标题，只抓取带横杠或空格的内容
                    if (trimmed.length > 0 && !trimmed.toLowerCase().includes('proxies:')) {
                      // 统一强制缩进：如果是节点开头用 2 空格，属性用 4 空格
                      const formattedLine = trimmed.startsWith('-') ? '  ' + trimmed : '    ' + trimmed;
                      allNodes.push(formattedLine);

                      // 提取名字用于去重和组生成
                      const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                      if (nameMatch) {
                        nodeNames.add(nameMatch[1].trim().replace(/^["']|["']$/g, ''));
                      }
                    }
                  }
                }
              } catch (e) { console.log(`跳过错误源: ${url}`); }
            }

            // 构建最终合法的 YAML
            const proxyListForGroups = Array.from(nodeNames).map(name => `      - "${name}"`).join('\n');
            
            const finalContent = [
              "allow-left-click: true",
              "mode: rule",
              "unified-delay: true",
              "",
              "proxies:", // 整个文件唯一的顶级 proxies 键
              ...allNodes,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              proxyListForGroups,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              proxyListForGroups,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalContent);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Fix: Absolute structural integrity for Mihomo" || exit 0
          git push origin HEAD
