name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          // 关键词增强：涵盖更多香港特征
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG|HONG KONG)/i;
          // 排除杂质
          const excludeRegex = /(美国|US|United States|Japan|日本|Singapore|新加坡|Taiwan|台湾|DIRECT|REJECT)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log("🚀 启动结构化提取（解决乱码与缩进问题）...");
              let finalNodes = new Set();

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;

                  // 1. 切分块：支持多种 YAML 切分习惯
                  const items = content.split(/\n\s*-/);
                  
                  items.forEach(item => {
                      // 过滤条件：必须含香港，且不含非相关国家关键词
                      if (hkRegex.test(item) && !excludeRegex.test(item)) {
                          // 检查是否具备节点核心三要素：name, server, port
                          if (item.includes('name:') && item.includes('server:') && item.includes('port:')) {
                              
                              // 核心修正：强行压成单行，去掉尾部垃圾，套上大括号
                              let clean = item.trim()
                                  .split('proxy-groups:')[0] // 彻底切断后面可能带的策略组
                                  .replace(/^[-\s]+/, '')    // 去掉开头的横杠和空格
                                  .replace(/\r?\n/g, ', ')   // 把多行合并，用逗号分隔
                                  .replace(/,\s*,/g, ',')    // 清理多余逗号
                                  .trim();

                              // 如果原本没带大括号，强行给它套上
                              if (!clean.startsWith('{')) {
                                  clean = `{${clean}}`;
                              }

                              finalNodes.add(`  - ${clean}`);
                          }
                      }
                  });
              }

              // 构造标准 Clash 头部
              const output = "proxies:\n" + Array.from(finalNodes).join('\n');
              fs.writeFileSync('hk_pure.yaml', output);
              console.log(`✅ 成功输出 ${finalNodes.size} 个标准化香港节点`);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
