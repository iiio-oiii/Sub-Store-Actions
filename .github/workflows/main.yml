name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pure Subscription (Direct Execution)
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # 1. 写入链接文件
          printf "%s" "$SUB_LINKS" > links.txt
          
          # 2. 直接使用 Node 镜像，通过远程下载脚本的方式运行
          # 我们不再 npm install，而是直接运行 xream 提供的核心逻辑
          docker run --rm \
            -v $(pwd):/opt/app \
            -w /opt/app \
            node:22-slim \
            sh -c "
              echo '--- 正在下载执行环境 ---' &&
              apt-get update && apt-get install -y wget &&
              wget -O sub-store-cli.js https://raw.githubusercontent.com/sub-store-org/Sub-Store/master/cli/sub-store-cli.js || wget -O sub-store-cli.js https://github.com/sub-store-org/Sub-Store/raw/master/sub-store-cli.js &&
              
              echo '--- 正在处理 23 个订阅源 ---' &&
              node sub-store-cli.js convert --source links.txt --script ./process.js --output hk_pure.yaml
            "
            
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure List (Docker)"
            git push
          else
            echo "Error: hk_pure.yaml was not generated!"
            exit 1
          fi
