name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pure Subscription via Docker
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # 1. 写入订阅源
          printf "%s" "$SUB_LINKS" > links.txt
          
          # 2. 使用标准的 node 镜像，现场安装并运行转换
          # 这确保了环境是纯净且可控的
          docker run --rm \
            -v $(pwd):/opt/app \
            -w /opt/app \
            node:22-slim \
            sh -c "npm install -g sub-store-cli && sub-store-cli convert --source links.txt --script ./process.js --output hk_pure.yaml"
            
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure List (Docker)"
            git push
          else
            echo "Error: hk_pure.yaml was not generated!"
            exit 1
          fi
