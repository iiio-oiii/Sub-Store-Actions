name: Generate Pure HK Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log("🚀 正在扩大搜索范围，抓取更多香港节点...");
              let finalNodes = [];
              let nodeNames = [];

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;
                  
                  // 针对混淆格式的简单预处理
                  const items = content.replace(/\r\n/g, '\n').split(/\n\s*-/);
                  
                  items.forEach(item => {
                      // 只要名字里带香港关键词，且有服务器地址，就抓取
                      if (hkRegex.test(item) && item.includes('server:')) {
                          let clean = item.replace(/^[^{]*/, '').replace(/[^}]*$/, '')
                              .replace(/[\{\}]/g, '')
                              .trim()
                              .replace(/\n/g, ', ')
                              .replace(/\s+/g, ' ')
                              .replace(/:\s*,/g, ': "", ')
                              .replace(/:\s*}/g, ': ""}')
                              .replace(/,\s*,/g, ',')
                              .replace(/,\s*$/g, '');

                          const nameMatch = clean.match(/name:\s*"?([^",{}]+)"?/);
                          if (nameMatch) {
                              const name = nameMatch[1].trim();
                              // 存储节点数据和名字
                              finalNodes.push(`  - {${clean}}`);
                              nodeNames.push(`      - "${name}"`);
                          }
                      }
                  });
              }

              // 去重并构建完整的 Mihomo 配置
              const uniqueNodes = Array.from(new Set(finalNodes));
              const uniqueNames = Array.from(new Set(nodeNames));

              const configHeader = [
                "port: 7890",
                "socks-port: 7891",
                "allow-left-click: true",
                "mode: rule",
                "log-level: info",
                "external-controller: 127.0.0.1:9090",
                "",
                "proxies:",
                ...uniqueNodes,
                "",
                "proxy-groups:",
                "  - name: 🚀 延迟自动选择",
                "    type: url-test",
                "    url: http://www.gstatic.com/generate_204",
                "    interval: 300",
                "    proxies:",
                ...uniqueNames,
                "",
                "  - name: 🔰 手动切换节点",
                "    type: select",
                "    proxies:",
                "      - 🚀 延迟自动选择",
                ...uniqueNames,
                "",
                "rules:",
                "  - DOMAIN-SUFFIX,google.com,🔰 手动切换节点",
                "  - DOMAIN-SUFFIX,github.com,🔰 手动切换节点",
                "  - DOMAIN-SUFFIX,interactivebrokers.com,🔰 手动切换节点",
                "  - MATCH,🔰 手动切换节点"
              ].join('\n');

              fs.writeFileSync('hk_pure.yaml', configHeader);
              console.log(`✅ 搞定！这次共保留了 ${uniqueNodes.length} 个香港节点。`);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add hk_pure.yaml
          git commit -m "Update HK Pure Subscription" || exit 0
          git push
