name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pure Subscription (Using Official Command)
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # 1. 写入链接文件
          printf "%s" "$SUB_LINKS" > links.txt
          
          # 2. 使用 Docker 运行，不写任何 path，直接调用封装好的 sub-store 命令
          # 这个镜像是专门为这个命令设计的，它应该能直接响应
          docker run --rm \
            -v $(pwd):/opt/app \
            -w /opt/app \
            xream/sub-store \
            sub-store convert --source links.txt --script ./process.js --output hk_pure.yaml
            
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure List (Docker)"
            git push
          else
            echo "Error: hk_pure.yaml was not generated!"
            exit 1
          fi
