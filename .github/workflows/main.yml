name: Ultimate_Standard_Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    # 显式声明读写权限，解决文件不生成的权限问题
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Standard Proxies Extraction
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          // 陈先生确认的 9 个带有 proxies 字段的优质源
          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              const req = https.get(url, { timeout: 15000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              });
              req.on('error', () => resolve(''));
              req.on('timeout', () => { req.destroy(); resolve(''); });
            });
          }

          async function main() {
            let allProxyLines = [];
            let proxyNames = [];

            for (const url of urls) {
              console.log(`📡 正在抓取: ${url}`);
              const content = await fetchUrl(url);
              if (!content || !content.includes('proxies:')) {
                console.log(`⚠️ 跳过无效源: ${url}`);
                continue;
              }

              const lines = content.split('\n');
              let isProxyArea = false;

              for (let line of lines) {
                const trimmed = line.trim();
                
                // 锁定 proxies: 区域
                if (trimmed === 'proxies:') {
                  isProxyArea = true;
                  continue;
                }

                if (isProxyArea) {
                  // 如果遇到新的顶级配置，停止该文件的抓取
                  if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                    isProxyArea = false;
                    continue;
                  }
                  
                  // 物理搬运
                  if (line.trim()) allProxyLines.push(line);

                  // 提取节点名并强制加引号
                  const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                  if (nameMatch) {
                    let n = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                    if (n) proxyNames.push(`      - "${n}"`);
                  }
                }
              }
            }

            const uniqueNames = [...new Set(proxyNames)];
            
            const finalYaml = [
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "unified-delay: true",
              "",
              "proxies:",
              ...allProxyLines,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
            console.log(`✅ 处理完成，共抓取节点名: ${uniqueNames.length} 个`);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          if git diff --staged --quiet; then
            echo "没有内容更新，跳过提交"
          else
            git commit -m "Auto Sync Standard Nodes: $(date +'%Y-%m-%d %H:%M')"
            git push origin HEAD
          fi
