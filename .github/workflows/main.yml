name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pure Subscription (Auto-Detect Command)
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          printf "%s" "$SUB_LINKS" > links.txt
          
          # 先搜索可用命令，再执行
          docker run --rm \
            -v $(pwd):/opt/app \
            -w /opt/app \
            xream/sub-store \
            sh -c "
              CMD=\$(command -v sub-store || command -v sub-store-cli || echo 'node /opt/sub-store/dist/cli.js')
              \$CMD convert --source links.txt --script ./process.js --output hk_pure.yaml
            "
            
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure List (Docker)"
            git push
          else
            echo "Error: hk_pure.yaml was not generated!"
            exit 1
          fi
