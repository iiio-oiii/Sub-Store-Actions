name: Ultimate Raw Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Pixel-Perfect Reconstruction
        run: |
          # 1. 纯净下载源文件
          curl -sSL https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml -o source.yml

          cat << 'EOF' > generator.js
          const fs = require('fs');
          
          // 读取原始文件
          const rawContent = fs.readFileSync('source.yml', 'utf8');
          
          // 只抓取 proxies: 下面的所有内容，直到文件结尾或下一个顶级键
          const lines = rawContent.split('\n');
          let proxyLines = [];
          let names = [];
          let start = false;

          for (let line of lines) {
              if (line.trim() === 'proxies:') {
                  start = true;
                  continue;
              }
              if (start) {
                  // 如果遇到顶级字段且不带缩进，说明 proxies 结束了
                  if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) break;
                  
                  proxyLines.push(line);
                  
                  // 提取名字用于组，必须处理各种表情符号和引号
                  const nameMatch = line.match(/name:\s*(.*)/);
                  if (nameMatch) {
                      let n = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                      if (n) names.push(`      - "${n}"`);
                  }
              }
          }

          // 重新构造，确保格式和 list.yml 高度一致
          const output = [
            "allow-left-click: true",
            "mode: rule",
            "log-level: info",
            "unified-delay: true",
            "",
            "proxies:",
            ...proxyLines,
            "",
            "proxy-groups:",
            "  - name: 🚀 自动选择",
            "    type: url-test",
            "    url: http://www.gstatic.com/generate_204",
            "    interval: 300",
            "    proxies:",
            ...new Set(names),
            "",
            "  - name: 🔰 手动切换",
            "    type: select",
            "    proxies:",
            "      - 🚀 自动选择",
            "      - DIRECT",
            ...new Set(names),
            "",
            "rules:",
            "  - MATCH,🔰 手动切换"
          ].join('\n');

          fs.writeFileSync('merged_nodes.yaml', output);
          EOF
          
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 关键：转换换行符为 LF，确保跨平台兼容性
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Full Reconstruction with LF" || exit 0
          git push
