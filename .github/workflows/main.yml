name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG)/i;
          const excludeRegex = /(美国|US|Japan|日本|Singapore|新加坡|Taiwan|台湾|Russia|俄罗斯|🏁|未知)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log("🚀 正在执行终极格式优化...");
              let finalNodes = new Set();

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;

                  const normalized = content.replace(/\r\n/g, '\n');
                  const items = normalized.split(/\n\s*-/);
                  
                  items.forEach(item => {
                      if (hkRegex.test(item) && !excludeRegex.test(item)) {
                          if (item.includes('name:') && item.includes('server:')) {
                              
                              let startIdx = item.indexOf('{');
                              let endIdx = item.lastIndexOf('}');
                              let contentInside = (startIdx !== -1 && endIdx !== -1) 
                                  ? item.substring(startIdx + 1, endIdx) 
                                  : item;

                              let clean = contentInside.trim()
                                  .replace(/\n/g, ', ')
                                  .replace(/\s+/g, ' ')
                                  .replace(/:\s*,/g, ': "", ')      // 修复空键值：ws-opts:, -> ws-opts: "",
                                  .replace(/:\s*}/g, ': ""}')       // 修复末尾空值
                                  .replace(/,\s*,/g, ',')           // 清理多余逗号
                                  .replace(/,\s*}/g, '}')           // 清理末尾逗号
                                  .replace(/^[\s,./\\]+/, '')       // 强力剔除开头符号
                                  .replace(/,\s*$/g, '')            // 再次清理行尾逗号
                                  .trim();

                              if (clean.length > 10) {
                                  finalNodes.add(`  - {${clean}}`);
                              }
                          }
                      }
                  });
              }

              const output = "proxies:\n" + Array.from(finalNodes).join('\n');
              fs.writeFileSync('hk_pure.yaml', output);
              console.log(`✅ 清理完成！已准备好 ${finalNodes.size} 个完美格式的香港节点`);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
