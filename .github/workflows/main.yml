name: Stable Multi-Source Raw Mirror

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Pixel-Perfect Multi-Merge
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          // 只挑选格式最规范、最稳定的标准 Clash 订阅源
          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/wenxig/dongtai-sub/refs/heads/main/data/sub.yaml',
            'https://raw.githubusercontent.com/PuddinCat/BestClash/main/proxies.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml',
            'https://raw.githubusercontent.com/telegeam/freenode/refs/heads/master/clash.yaml'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 20000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', () => resolve(''));
            });
          }

          async function main() {
            let allProxyLines = [];
            let proxyNames = [];

            for (const url of urls) {
              console.log(`📡 Processing: ${url}`);
              const content = await fetchUrl(url);
              if (!content || !content.includes('proxies:')) continue; // 必须包含规范关键字才处理

              const lines = content.split('\n');
              let start = false;

              for (let line of lines) {
                const trimmed = line.trim();
                
                // 1. 寻找 proxies: 发令枪
                if (trimmed === 'proxies:') {
                  start = true;
                  continue;
                }
                
                // 2. 物理搬运：如果开启了抓取模式
                if (start) {
                  // 如果遇到顶级字段（无缩进且不是节点），说明该文件 proxies 结束
                  if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                    start = false;
                    continue;
                  }
                  
                  // 直接推入原始行
                  allProxyLines.push(line);
                  
                  // 3. 提取名字用于组
                  const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                  if (nameMatch) {
                    let n = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                    if (n) proxyNames.push(`      - "${n}"`);
                  }
                }
              }
            }

            const output = [
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "unified-delay: true",
              "",
              "proxies:",
              ...allProxyLines,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...new Set(proxyNames),
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...new Set(proxyNames),
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', output);
          }
          main();
          EOF
          
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 核心修正：移除 \r 换行符，这是能够下载的关键
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Stable Mirror Update $(date +'%Y-%m-%d')" || exit 0
          git push
