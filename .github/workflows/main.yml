name: Precise Node Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Merge Nodes
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 30000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', () => resolve(''));
            });
          }

          async function main() {
            let allProxies = [];
            let proxyNames = [];

            for (const url of urls) {
              const content = await fetchUrl(url);
              if (!content) continue;

              const lines = content.split('\n');
              let isProxySection = false;
              let currentProxy = [];

              for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let trimmed = line.trim();

                // 识别 proxies 区域开始
                if (trimmed === 'proxies:') {
                  isProxySection = true;
                  continue;
                }
                
                // 识别 proxies 区域结束（遇到下一个顶级字段）
                if (isProxySection && line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                  isProxySection = false;
                }

                if (isProxySection) {
                  // 如果是以 - 开头，代表一个新节点的起始
                  if (trimmed.startsWith('-')) {
                    if (currentProxy.length > 0) {
                      allProxies.push(currentProxy.join('\n'));
                    }
                    currentProxy = [line];
                  } else if (currentProxy.length > 0 && (line.startsWith(' ') || line === '')) {
                    // 保持原有的缩进结构
                    currentProxy.push(line);
                  }
                }
              }
              // 推入最后一个节点
              if (currentProxy.length > 0) allProxies.push(currentProxy.join('\n'));
            }

            // 提取节点名并确保唯一性
            allProxies.forEach(block => {
              const nameMatch = block.match(/name:\s*(.*)/);
              if (nameMatch) {
                let name = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                if (name) proxyNames.push(`      - "${name}"`);
              }
            });

            const uniqueNames = [...new Set(proxyNames)];

            // 构造最终的 Mihomo/Clash 配置文件
            const finalYaml = [
              "port: 7890",
              "socks-port: 7891",
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "",
              "proxies:",
              ...allProxies,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
            console.log(`✅ 成功复刻节点！总数: ${allProxies.length}`);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add merged_nodes.yaml
          git commit -m "Fix indentation and retain all nodes" || exit 0
          git push
