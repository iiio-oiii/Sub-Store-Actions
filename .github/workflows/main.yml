name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log(`🚀 开始从 23 个源深度抠取香港节点...`);
              let allNodes = [];
              const hkInclude = /(香港|HK|HongKong|🇭🇰|HKG)/i;
              const globalExclude = /(美国|日本|新加坡|韩国|台湾|US|JP|SG|KR|TW|United States|Japan|Singapore|Korea|Taiwan|DIRECT|REJECT)/i;

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;

                  // 处理 Base64 格式 (V2Ray/SS 链接)
                  if (!content.includes('proxies:')) {
                      try {
                          const decoded = Buffer.from(content.trim(), 'base64').toString('utf-8');
                          decoded.split('\n').forEach(line => {
                              if (hkInclude.test(line) && !globalExclude.test(line) && line.includes('://')) {
                                  allNodes.push(line.trim());
                              }
                          });
                      } catch(e) {}
                  }

                  // 处理 Clash YAML 格式 (提取完整对象)
                  const lines = content.split('\n');
                  lines.forEach(line => {
                      const l = line.trim();
                      // 必须包含香港关键字，且必须包含 server/type 指纹，且排除分流规则行
                      if (hkInclude.test(l) && (l.includes('server:') || l.includes('type:')) && !l.includes('DOMAIN')) {
                          if (!globalExclude.test(l)) {
                              // 规范化：确保是以 "- " 开头
                              const formatted = l.startsWith('-') ? l : `- ${l}`;
                              allNodes.push(formatted);
                          }
                      }
                  });
              }

              // 物理去重
              const uniqueNodes = Array.from(new Set(allNodes));
              console.log(`✅ 深度提取完成，共获取 ${uniqueNodes.length} 个香港节点。`);

              // 构建 Clash 订阅格式
              let yamlContent = "proxies:\n" + uniqueNodes.map(n => `  ${n.replace(/^- /, '')}`).join('\n');
              
              fs.writeFileSync('hk_pure.yaml', yamlContent);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
