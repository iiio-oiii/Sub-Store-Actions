name: Ultimate_Diagnostics_Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 显式声明权限
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Bulletproof Extraction
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function main() {
            let allProxyLines = [];
            let proxyNames = [];

            for (const url of urls) {
              try {
                const content = await new Promise((res, rej) => {
                  https.get(url, { timeout: 15000 }, (r) => {
                    let d = '';
                    r.on('data', (c) => d += c);
                    r.on('end', () => res(d));
                  }).on('error', rej);
                });

                if (!content || !content.includes('proxies:')) continue;
                const lines = content.split('\n');
                let isArea = false;
                for (let l of lines) {
                  if (l.trim().toLowerCase().startsWith('proxies:')) { isArea = true; continue; }
                  if (isArea) {
                    if (l.length > 0 && !l.startsWith(' ') && !l.startsWith('-')) { isArea = false; continue; }
                    if (l.trim()) {
                      allProxyLines.push(l);
                      const m = l.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                      if (m) proxyNames.push(`      - "${m[1].trim()}"`);
                    }
                  }
                }
              } catch (e) { console.log(`Skipping ${url}`); }
            }

            const output = [
              "allow-left-click: true",
              "mode: rule",
              "proxies:",
              ...allProxyLines,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...new Set(proxyNames),
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...new Set(proxyNames),
              "",
              "rules: [MATCH,🔰 手动切换]"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', output);
            console.log("File write complete.");
          }
          main();
          EOF
          node generator.js

      - name: Debug and Push
        run: |
          # 1. 检查文件是否真的生成了
          echo "Checking if file exists..."
          ls -la merged_nodes.yaml
          
          # 2. Git 配置
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 3. 强制处理并提交
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          
          # 4. 检查是否有变动，如果有则强制推送
          if git diff --staged --quiet; then
            echo "No changes detected, but forcing a commit for diagnostics..."
            date >> debug.log
            git add debug.log
            git commit -m "Diagnostic Update $(date)"
          else
            git commit -m "Nodes Update $(date)"
          fi
          
          # 5. 推送到当前分支
          git push origin HEAD
