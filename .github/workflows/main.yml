name: Generate All Nodes Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate Full Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 20000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log("🚀 正在从 23 个源提取所有节点...");
              let finalNodes = [];
              let nodeNames = [];

              for (const link of links) {
                  let content = await fetchLink(link.trim());
                  if (!content) continue;
                  
                  if (!content.includes('server:')) {
                      try { content = Buffer.from(content, 'base64').toString(); } catch(e) {}
                  }

                  // 提取所有节点块
                  const blocks = content.replace(/\r\n/g, '\n').split(/\n\s*-/);
                  
                  blocks.forEach(block => {
                      if (block.includes('server:')) {
                          const fields = ['name', 'server', 'port', 'type', 'uuid', 'password', 'cipher', 'alterId', 'tls', 'sni', 'network', 'ws-opts', 'headers', 'skip-cert-verify', 'path'];
                          let nodeObj = {};

                          fields.forEach(field => {
                              const regex = new RegExp(`${field}:\\s*({.*?}|".*?"|'.*?'|[^,\\n\\}]+)`);
                              const match = block.match(regex);
                              if (match) {
                                  nodeObj[field] = match[1].trim().replace(/^["']|["']$/g, '');
                              }
                          });

                          if (nodeObj.name && nodeObj.server) {
                              // 处理重名，防止配置文件冲突
                              let cleanName = nodeObj.name.replace(/[\[\]"]/g, '').trim();
                              if (nodeNames.includes(`      - "${cleanName}"`)) {
                                  cleanName = `${cleanName}_${Math.random().toString(36).substr(2, 4)}`;
                              }

                              let kv = Object.entries(nodeObj).map(([k, v]) => {
                                  if (k === 'name') return `${k}: "${cleanName}"`;
                                  if (k === 'ws-opts' || k === 'headers') return `${k}: {${v.replace(/[\{\}]/g, '')}}`;
                                  return `${k}: ${v}`;
                              }).join(', ');
                              
                              finalNodes.push(`  - {${kv}}`);
                              nodeNames.push(`      - "${cleanName}"`);
                          }
                      }
                  });
              }

              // 移除重复节点
              const uniqueNodes = [...new Set(finalNodes)];
              const uniqueNames = [...new Set(nodeNames)];

              // 构造标准 YAML
              let config = [
                "port: 7890",
                "socks-port: 7891",
                "allow-left-click: true",
                "mode: rule",
                "log-level: info",
                "external-controller: 127.0.0.1:9090",
                "",
                "proxies:",
                ...uniqueNodes,
                "",
                "proxy-groups:",
                "  - name: 🚀 自动选择(延迟最低)",
                "    type: url-test",
                "    url: http://www.gstatic.com/generate_204",
                "    interval: 300",
                "    proxies:",
                ...uniqueNames,
                "",
                "  - name: 🔰 手动切换节点",
                "    type: select",
                "    proxies:",
                "      - 🚀 自动选择(延迟最低)",
                "      - DIRECT",
                ...uniqueNames,
                "",
                "rules:",
                "  - DOMAIN-SUFFIX,interactivebrokers.com,🚀 自动选择(延迟最低)",
                "  - DOMAIN-SUFFIX,google.com,🔰 手动切换节点",
                "  - MATCH,🔰 手动切换节点"
              ].join('\n');

              fs.writeFileSync('all_nodes.yaml', config);
              console.log(`✅ 处理完成！已提取 ${uniqueNodes.length} 个节点。`);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add all_nodes.yaml
          git commit -m "Update All Nodes Config" || exit 0
          git push
