name: Ultimate_Node_Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Pixel-Perfect Node Injection
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/wenxig/dongtai-sub/refs/heads/main/data/sub.yaml',
            'https://raw.githubusercontent.com/PuddinCat/BestClash/main/proxies.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml',
            'https://raw.githubusercontent.com/telegeam/freenode/refs/heads/master/clash.yaml'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 20000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', () => resolve(''));
            });
          }

          async function main() {
            let allProxyBlocks = [];
            let proxyNames = [];

            for (const url of urls) {
              const content = await fetchUrl(url);
              if (!content || !content.includes('proxies:')) continue;

              const lines = content.split('\n');
              let isProxyArea = false;

              for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed === 'proxies:') { isProxyArea = true; continue; }
                if (isProxyArea) {
                  if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                    isProxyArea = false;
                    continue;
                  }
                  allProxyBlocks.push(line);
                  const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                  if (nameMatch) {
                    let n = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                    if (n) proxyNames.push(`      - "${n}"`);
                  }
                }
              }
            }

            const uniqueNames = [...new Set(proxyNames)];
            const header = [
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "unified-delay: true",
              "",
              "proxies:"
            ].join('\n');

            const groups = [
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames
