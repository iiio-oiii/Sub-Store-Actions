name: Multi-Source Node Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Advanced Multi-Format Merge
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://542fd54b.996391.xyz/sub/vAfdhHotgHHhuHkhdFCEPCkiyjDII1Vr5XSW.yaml',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/wenxig/dongtai-sub/refs/heads/main/data/sub.yaml',
            'https://raw.githubusercontent.com/PuddinCat/BestClash/main/proxies.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml',
            'https://raw.githubusercontent.com/telegeam/freenode/refs/heads/master/clash.yaml'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 30000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', () => resolve(''));
            });
          }

          async function main() {
            let allProxyBlocks = [];
            let proxyNames = [];

            for (const url of urls) {
              console.log(`📡 正在抓取: ${url}`);
              let content = await fetchUrl(url);
              if (!content) continue;

              // 自动识别 Base64 并解码
              if (!content.includes('proxies:') && !content.includes('server:')) {
                try { content = Buffer.from(content, 'base64').toString(); } catch(e) {}
              }

              const lines = content.split('\n');
              let isProxySection = false;
              let currentBlock = [];

              for (let line of lines) {
                const trimmed = line.trim();
                
                // 找到 proxies 区域
                if (trimmed === 'proxies:') {
                  isProxySection = true;
                  continue;
                }
                
                // 遇到非缩进的顶级字段则停止
                if (isProxySection && line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                  isProxySection = false;
                }

                if (isProxySection) {
                  if (trimmed.startsWith('-')) {
                    if (currentBlock.length > 0) allProxyBlocks.push(currentBlock.join('\n'));
                    currentBlock = [line];
                  } else if (currentBlock.length > 0) {
                    currentBlock.push(line);
                  }

                  // 提取名字用于组
                  const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                  if (nameMatch) {
                    proxyNames.push(nameMatch[1].trim());
                  }
                }
              }
              if (currentBlock.length > 0) allProxyBlocks.push(currentBlock.join('\n'));
            }

            // 去重并统一加引号
            const uniqueNames = [...new Set(proxyNames)].map(n => `      - "${n}"`);

            const finalYaml = [
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "unified-delay: true",
              "",
              "proxies:",
              ...allProxyBlocks,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
            console.log(`✅ 合并完成！总节点数: ${allProxyBlocks.length}`);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 关键修正：确保换行符统一为 LF，并清理多余空格
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Merge multiple verified sources" || exit 0
          git push
