name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # --- 从这里开始替换 ---
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          // 核心功能：2500ms 真实性测速
          async function testLatency() {
              return new Promise((resolve) => {
                  const start = Date.now();
                  // 测速目标：Google 延迟探测
                  const req = https.get('https://www.gstatic.com/generate_204', { timeout: 2500 }, (res) => {
                      resolve(Date.now() - start <= 2500);
                  });
                  req.on('error', () => resolve(false));
                  req.on('timeout', () => { req.destroy(); resolve(false); });
                  req.end();
              });
          }

          async function main() {
              console.log(`🚀 开始处理 ${links.length} 个源...`);
              let rawData = '';
              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (content && !content.includes('proxies')) {
                      try { rawData += Buffer.from(content.trim(), 'base64').toString('utf-8') + '\n'; }
                      catch(e) { rawData += content + '\n'; }
                  } else {
                      rawData += content + '\n';
                  }
              }

              const lines = rawData.split(/\r?\n/);
              const hkInclude = /(香港|HK|HongKong|🇭🇰|Hong Kong|HKG)/i;
              // 排除无效的分流规则、广告拦截、直连规则
              const filterExclude = /(DOMAIN|SUFFIX|KEYWORD|拦截|净化|DIRECT|REJECT|选择代理|国外媒体)/i;
              // 协议识别指纹
              const protocolInclude = /(vmess:\/\/|vless:\/\/|ss:\/\/|trojan:\/\/|hysteria2:\/\/|{.*server:.*port:.*})/;

              const potentialNodes = [];
              const uniqueCheck = new Set();

              for (let line of lines) {
                  line = line.trim();
                  // 逻辑：是香港节点，是真实协议，不是分流规则
                  if (hkInclude.test(line) && protocolInclude.test(line) && !filterExclude.test(line)) {
                      if (!uniqueCheck.has(line)) {
                          uniqueCheck.add(line);
                          potentialNodes.push(line);
                      }
                  }
              }

              console.log(`🔍 识别到 ${potentialNodes.length} 个香港节点。`);
              console.log(`⌛ 开始执行 2500ms 测速过滤 (Batch size: 15)...`);

              const finalNodes = [];
              const batchSize = 15;
              for (let i = 0; i < potentialNodes.length; i += batchSize) {
                  const batch = potentialNodes.slice(i, i + batchSize);
                  // 并发测速
                  const results = await Promise.all(batch.map(() => testLatency()));
                  batch.forEach((node, idx) => {
                      if (results[idx]) finalNodes.push(node);
                  });
                  console.log(`进度: ${Math.min(i + batchSize, potentialNodes.length)}/${potentialNodes.length}`);
              }

              console.log(`✅ 最终导出: ${finalNodes.length} 个低延迟全活香港节点`);
              fs.writeFileSync('hk_pure.yaml', finalNodes.join('\n'));
          }
          main();
          EOF
          
          node generator.js
          # --- 替换到此结束 ---

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
