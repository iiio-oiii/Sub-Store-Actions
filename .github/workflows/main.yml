name: Generate Pure HK Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 20000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          function decodeContent(content) {
              if (!content) return "";
              // 如果是 Base64 格式（以 vmess://, ss:// 等开头或无明显 YAML 特征）
              if (!content.includes('proxies:') && !content.includes('server:')) {
                  try {
                      return Buffer.from(content, 'base64').toString();
                  } catch (e) {
                      return content;
                  }
              }
              return content;
          }

          async function main() {
              console.log("🚀 正在为您重新构建高兼容性的香港订阅...");
              let finalNodes = [];
              let nodeNames = [];

              for (const link of links) {
                  let content = await fetchLink(link.trim());
                  if (!content) continue;
                  
                  // 1. 自动尝试解码 Base64 (很多源是这种格式)
                  if (!content.includes('server:')) {
                      try { content = Buffer.from(content, 'base64').toString(); } catch(e) {}
                  }

                  const blocks = content.replace(/\r\n/g, '\n').split(/\n\s*-/);
                  
                  blocks.forEach(block => {
                      // 核心过滤：必须包含 香港/HK，且绝对不能包含 美国/US/日本/台湾 等
                      const mustHave = /(香港|HK|HongKong|🇭🇰|HKG)/i.test(block);
                      const mustNotHave = /(美国|US|Japan|日本|Taiwan|台湾|Singapore|新加坡|Korea|韩国)/i.test(block);

                      if (mustHave && !mustNotHave && block.includes('server:')) {
                          const fields = ['name', 'server', 'port', 'type', 'uuid', 'password', 'cipher', 'alterId', 'tls', 'sni', 'network', 'ws-opts', 'headers', 'skip-cert-verify', 'path'];
                          let nodeObj = {};

                          fields.forEach(field => {
                              const regex = new RegExp(`${field}:\\s*({.*?}|".*?"|'.*?'|[^,\\n\\}]+)`);
                              const match = block.match(regex);
                              if (match) {
                                  nodeObj[field] = match[1].trim().replace(/^["']|["']$/g, '');
                              }
                          });

                          if (nodeObj.name && nodeObj.server) {
                              let kv = Object.entries(nodeObj).map(([k, v]) => {
                                  if (k === 'ws-opts' || k === 'headers') return `${k}: {${v.replace(/[\{\}]/g, '')}}`;
                                  return `${k}: ${v}`;
                              }).join(', ');
                              
                              finalNodes.push(`  - {${kv}}`);
                              nodeNames.push(`      - "${nodeObj.name}"`);
                          }
                      }
                  });
              }

              // 使用数组 join('\n') 确保每一行都有正确的物理换行
              const outputLines = [
                  "port: 7890",
                  "socks-port: 7891",
                  "allow-left-click: true",
                  "mode: rule",
                  "log-level: info",
                  "external-controller: 127.0.0.1:9090",
                  "",
                  "proxies:",
                  ...Array.from(new Set(finalNodes)),
                  "",
                  "proxy-groups:",
                  "  - name: 🚀 延迟自动选择",
                  "    type: url-test",
                  "    url: http://www.gstatic.com/generate_204",
                  "    interval: 300",
                  "    proxies:",
                  ...Array.from(new Set(nodeNames)),
                  "",
                  "  - name: 🔰 手动切换节点",
                  "    type: select",
                  "    proxies:",
                  "      - 🚀 延迟自动选择",
                  ...Array.from(new Set(nodeNames)),
                  "",
                  "rules:",
                  "  - DOMAIN-SUFFIX,google.com,🔰 手动切换节点",
                  "  - DOMAIN-SUFFIX,interactivebrokers.com,🔰 手动切换节点",
                  "  - MATCH,🔰 手动切换节点"
              ];

              fs.writeFileSync('hk_pure.yaml', outputLines.join('\n'));
              console.log("✅ 格式化完成！文件现在符合标准 YAML 规范。");
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add hk_pure.yaml
          git commit -m "Update HK Pure Subscription" || exit 0
          git push
