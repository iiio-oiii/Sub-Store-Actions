name: Pure Raw Node Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Merge Nodes
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const url = 'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml';

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 30000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', () => resolve(''));
            });
          }

          async function main() {
            const content = await fetchUrl(url);
            if (!content) return;

            const lines = content.split('\n');
            let proxiesList = [];
            let proxyNames = [];
            let isProxySection = false;

            for (let line of lines) {
              const trimmed = line.trim();
              
              // 找到 proxies 区域
              if (trimmed === 'proxies:') {
                isProxySection = true;
                continue;
              }
              
              // 遇到下一个顶级配置则停止
              if (isProxySection && line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                isProxySection = false;
              }

              if (isProxySection) {
                // 1. 收集原始行（不做任何缩进修改，保持 0 缩进开头）
                proxiesList.push(line);

                // 2. 提取节点名用于生成组
                const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                if (nameMatch) {
                  proxyNames.push(`      - "${nameMatch[1].trim()}"`);
                }
              }
            }

            const uniqueNames = [...new Set(proxyNames)];

            // 构造最精简、最稳健的配置文件
            const finalYaml = [
              "port: 7890",
              "socks-port: 7891",
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "unified-delay: true",
              "",
              "proxies:",
              ...proxiesList, // 这里直接填入原始行，不再额外加空格
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
            console.log("✅ 像素级复刻完成！");
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add merged_nodes.yaml
          git commit -m "Ultra-precise raw merge" || exit 0
          git push
