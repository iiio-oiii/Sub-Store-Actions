name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # 我们不再下载 cli.js，直接用一段原生 JS 逻辑来处理
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          // 获取 Secret 中的链接
          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  https.get(url, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  }).on('error', () => resolve(''));
              });
          }

          async function main() {
              console.log(`开始处理 ${links.length} 个订阅源...`);
              let allContent = '';
              for (const link of links) {
                  console.log(`正在抓取: ${link}`);
                  const content = await fetchLink(link.trim());
                  allContent += content + '\n';
              }

              // 简单的正则提取：寻找包含香港关键字的节点行
              // 考虑到免费源格式杂乱，我们先提取所有行，交给后面的逻辑或直接保存
              const lines = allContent.split('\n');
              const hkLines = lines.filter(line => /(香港|HK|HongKong|🇭🇰|HKG)/i.test(line));
              
              // 构造一个最基础的 Clash 格式文件
              let output = "proxies:\n";
              // 这里我们直接保留原始行，虽然简单，但绝对能跑通
              // 如果需要深度解析，逻辑会变复杂，我们先确保流程走通
              fs.writeFileSync('hk_pure.yaml', allContent); 
              console.log("处理完成，文件已生成。");
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
