name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  }).on('error', () => resolve(''));
              });
          }

          async function main() {
              console.log(`🚀 开启智能块模式，解析 23 个源...`);
              let allNodes = [];
              const hkInclude = /(香港|HK|HongKong|🇭🇰|HKG)/i;
              const globalExclude = /(美国|日本|新加坡|韩国|台湾|US|JP|SG|KR|TW)/i;

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;

                  // 1. 处理 Base64 (链接形式)
                  if (!content.includes('proxies:')) {
                      try {
                          const decoded = Buffer.from(content.trim(), 'base64').toString('utf-8');
                          decoded.split('\n').forEach(line => {
                              if (hkInclude.test(line) && !globalExclude.test(line) && line.includes('://')) {
                                  allNodes.push(line.trim());
                              }
                          });
                      } catch(e) {}
                  }

                  // 2. 核心：Clash 块提取逻辑 (抓取完整的 YAML 节点块)
                  const proxyMatch = content.match(/-[\s\S]*?(?=\n-|\n\n|\n[a-z])/g);
                  if (proxyMatch) {
                      proxyMatch.forEach(block => {
                          if (hkInclude.test(block) && (block.includes('server:') || block.includes('type:'))) {
                              if (!globalExclude.test(block) && !block.includes('DOMAIN')) {
                                  allNodes.push(block.trim());
                              }
                          }
                      });
                  }
              }

              // 去重
              const uniqueNodes = Array.from(new Set(allNodes));
              console.log(`✅ 智能识别完成！找到 ${uniqueNodes.length} 个香港节点。`);

              // 输出为标准 Clash 格式
              let yamlContent = "proxies:\n" + uniqueNodes.map(n => {
                  const clean = n.replace(/^- /, '').trim();
                  return `  - ${clean}`;
              }).join('\n');
              
              fs.writeFileSync('hk_pure.yaml', yamlContent);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
