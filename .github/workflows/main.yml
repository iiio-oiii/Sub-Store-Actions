name: Ultimate Multi-Source Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Comprehensive Reconstruction
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://542fd54b.996391.xyz/sub/vAfdhHotgHHhuHkhdFCEPCkiyjDII1Vr5XSW.yaml',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/wenxig/dongtai-sub/refs/heads/main/data/sub.yaml',
            'https://raw.githubusercontent.com/PuddinCat/BestClash/main/proxies.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml',
            'https://raw.githubusercontent.com/telegeam/freenode/refs/heads/master/clash.yaml',
            'https://raw.githubusercontent.com/Pawdroid/Free-servers/refs/heads/main/sub',
            'https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Vless.txt',
            'https://raw.githubusercontent.com/pachangcheng/mianfeijiedian/refs/heads/main/should.txt',
            'https://raw.githubusercontent.com/Leon406/SubCrawler/refs/heads/main/sub/share/vless',
            'https://raw.githubusercontent.com/bin1site1/V2rayFree/refs/heads/main/config.txt',
            'https://raw.githubusercontent.com/niq0n0pin/v2rayfree-nice-tracker/main/backup/nodes.txt',
            'https://raw.githubusercontent.com/Barabama/FreeNodes/main/nodes/simple.txt',
            'https://raw.githubusercontent.com/ishalumi/proxy-node-collector/main/output/nodes.txt'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 30000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', () => resolve(''));
            });
          }

          async function main() {
            let allProxyLines = [];
            let proxyNames = [];

            for (const url of urls) {
              console.log(`📡 Fetching: ${url}`);
              let content = await fetchUrl(url);
              if (!content) continue;

              // 自动解码 Base64 (很多源是加密的)
              if (!content.includes('server:') && !content.includes('name:')) {
                try { content = Buffer.from(content, 'base64').toString(); } catch(e) {}
              }

              const lines = content.split('\n');
              let isProxyArea = false;
              let currentBlock = [];

              for (let line of lines) {
                const trimmed = line.trim();

                // 核心逻辑：如果看到 "proxies:" 或者是符合节点特征的行
                if (trimmed === 'proxies:') {
                  isProxyArea = true;
                  continue;
                }

                // 如果没看到 "proxies:" 但看到了以 "- name:" 开头，也强制开启抓取
                if (trimmed.startsWith('- name:') || trimmed.startsWith('- {name:')) {
                  isProxyArea = true;
                }

                if (isProxyArea) {
                  // 遇到下一个顶级配置（无缩进且不是节点）则停止该文件的抓取
                  if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                    isProxyArea = false;
                    continue;
                  }

                  // 像素级收集行
                  allProxyLines.push(line);

                  // 提取名字用于 Group，确保加引号防止表情符号导致报错
                  const nameMatch = line.match(/name:\s*(.*)/);
                  if (nameMatch) {
                    let n = nameMatch[1].trim().replace(/^["']|["']$/g, '').split(',')[0].replace(/[{} ]/g, '');
                    if (n) proxyNames.push(`      - "${n}"`);
                  }
                }
              }
            }

            const output = [
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "unified-delay: true",
              "",
              "proxies:",
              ...allProxyLines,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...new Set(proxyNames),
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...new Set(proxyNames),
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', output);
            console.log("✅ 全部 21 个订阅源已处理完毕！");
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 核心修复：移除 \r 换行符并强制使用 UTF-8
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Merged All 21 Sources $(date +'%Y-%m-%d')" || exit 0
          git push
