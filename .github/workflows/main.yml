name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 10000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log(`开始深度处理 ${links.length} 个订阅源...`);
              let rawData = '';
              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  rawData += content + '\n';
              }

              // 1. 处理 Base64 加密的内容 (很多免费源是这种格式)
              let decodedData = rawData;
              try {
                  if (!rawData.includes('proxies:') && !rawData.includes('server:')) {
                      decodedData = Buffer.from(rawData.trim(), 'base64').toString('utf-8');
                  }
              } catch (e) {
                  // 如果不是 Base64，保持原样
              }

              // 2. 提取所有行，精准筛选香港节点
              // 匹配包含 香港、HK、HongKong、Emoji旗帜 的行
              const lines = decodedData.split('\n');
              const hkKeywords = /(香港|HK|HongKong|🇭🇰|Hong Kong|HONG KONG|HKG)/i;
              
              // 3. 去重与清洗
              // 免费源里有很多重复的 IP，我们按行内容做个 Set 去重
              const uniqueNodes = new Set();
              lines.forEach(line => {
                  const trimmed = line.trim();
                  if (trimmed && hkKeywords.test(trimmed)) {
                      // 简单过滤掉明显的非节点行（如 HTML 标签）
                      if (!trimmed.includes('<') && !trimmed.includes('div')) {
                          uniqueNodes.add(trimmed);
                      }
                  }
              });

              const resultNodes = Array.from(uniqueNodes);
              console.log(`筛选完成：从 10MB 缩减至 ${resultNodes.length} 个香港节点`);

              // 4. 写入文件 (保持最通用的每行一个节点的格式，方便导入)
              // 如果你需要 Clash 格式，可以根据需要调整头部
              fs.writeFileSync('hk_pure.yaml', resultNodes.join('\n'));
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
