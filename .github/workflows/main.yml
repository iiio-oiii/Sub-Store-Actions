name: Compare and Merge All Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Merge Nodes
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/iiio-oiii/Sub-Store-Actions/refs/heads/main/all_nodes.yaml'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              https.get(url, { timeout: 30000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', () => resolve(''));
            });
          }

          async function main() {
            let allProxies = [];
            let proxyNames = [];

            for (const url of urls) {
              console.log(`📡 正在抓取: ${url}`);
              const content = await fetchUrl(url);
              if (!content) continue;

              // 识别 proxies 列表的开始位置
              const lines = content.split('\n');
              let isProxySection = false;
              let currentProxy = [];

              for (let line of lines) {
                const trimmed = line.trim();
                
                // 寻找 proxies: 标记
                if (trimmed === 'proxies:') {
                  isProxySection = true;
                  continue;
                }
                // 如果遇到下一个顶级字段（如 proxy-groups），停止抓取
                if (isProxySection && line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                  if (currentProxy.length > 0) allProxies.push(currentProxy.join('\n'));
                  isProxySection = false;
                  break;
                }

                if (isProxySection) {
                  // 如果是以 - 开头，说明是新节点的开始
                  if (line.trim().startsWith('-')) {
                    if (currentProxy.length > 0) allProxies.push(currentProxy.join('\n'));
                    currentProxy = [line];
                  } else if (currentProxy.length > 0) {
                    currentProxy.push(line);
                  }
                }
              }
              if (currentProxy.length > 0) allProxies.push(currentProxy.join('\n'));
            }

            // 提取所有节点名称用于生成代理组
            allProxies.forEach(proxyBlock => {
              const nameMatch = proxyBlock.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
              if (nameMatch) {
                proxyNames.push(`      - "${nameMatch[1].trim()}"`);
              }
            });

            const uniqueNames = [...new Set(proxyNames)];

            const finalYaml = [
              "port: 7890",
              "socks-port: 7891",
              "allow-left-click: true",
              "mode: rule",
              "log-level: info",
              "",
              "proxies:",
              ...allProxies,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
            console.log(`✅ 合并完成！总计节点数: ${allProxies.length}`);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add merged_nodes.yaml
          git commit -m "Merge all nodes from list.yml and all_nodes.yaml" || exit 0
          git push
