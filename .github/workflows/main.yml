name: Generate Pure HK Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 20000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          function decodeContent(content) {
              if (!content) return "";
              // 如果是 Base64 格式（以 vmess://, ss:// 等开头或无明显 YAML 特征）
              if (!content.includes('proxies:') && !content.includes('server:')) {
                  try {
                      return Buffer.from(content, 'base64').toString();
                  } catch (e) {
                      return content;
                  }
              }
              return content;
          }

          async function main() {
              console.log("🚀 正在从 23 个订阅源中深度挖掘香港节点...");
              let finalNodes = [];
              let nodeNames = [];

              for (const link of links) {
                  let content = await fetchLink(link.trim());
                  if (!content) continue;
                  
                  content = decodeContent(content);
                  
                  // 针对 YAML 格式的增强解析
                  const blocks = content.replace(/\r\n/g, '\n').split(/\n\s*-/);
                  
                  blocks.forEach(block => {
                      if (hkRegex.test(block) && (block.includes('server:') || block.includes('://'))) {
                          // 提取字段的通用逻辑
                          const fields = ['name', 'server', 'port', 'type', 'uuid', 'password', 'cipher', 'alterId', 'tls', 'sni', 'network', 'ws-opts', 'headers', 'skip-cert-verify', 'path'];
                          let nodeObj = {};

                          fields.forEach(field => {
                              const regex = new RegExp(`${field}:\\s*({.*?}|".*?"|'.*?'|[^,\\n\\}]+)`);
                              const match = block.match(regex);
                              if (match) {
                                  nodeObj[field] = match[1].trim().replace(/^["']|["']$/g, '');
                              }
                          });

                          // 如果是标准的 YAML 块
                          if (nodeObj.name && nodeObj.server) {
                              let kv = Object.entries(nodeObj).map(([k, v]) => {
                                  if (k === 'ws-opts' || k === 'headers') return `${k}: {${v.replace(/[\{\}]/g, '')}}`;
                                  return `${k}: ${v}`;
                              }).join(', ');
                              
                              finalNodes.push(`  - {${kv}}`);
                              nodeNames.push(`      - "${nodeObj.name}"`);
                          }
                      }
                  });
              }

              const uniqueNodes = Array.from(new Set(finalNodes));
              const uniqueNames = Array.from(new Set(nodeNames));

              const config = [
                "port: 7890",
                "socks-port: 7891",
                "mode: rule",
                "log-level: info",
                "proxies:",
                ...uniqueNodes,
                "proxy-groups:",
                "  - name: 🚀 延迟自动选择",
                "    type: url-test",
                "    url: http://www.gstatic.com/generate_204",
                "    interval: 300",
                "    proxies:",
                ...uniqueNames,
                "  - name: 🔰 手动切换节点",
                "    type: select",
                "    proxies:",
                "      - 🚀 延迟自动选择",
                ...uniqueNames,
                "rules:",
                "  - DOMAIN-SUFFIX,google.com,🔰 手动切换节点",
                "  - DOMAIN-SUFFIX,interactivebrokers.com,🔰 手动切换节点",
                "  - MATCH,🔰 手动切换节点"
              ].join('\n');

              fs.writeFileSync('hk_pure.yaml', config);
              console.log(`✅ 深度清理完成！共获得 ${uniqueNodes.length} 个香港节点。`);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add hk_pure.yaml
          git commit -m "Update HK Pure Subscription" || exit 0
          git push
