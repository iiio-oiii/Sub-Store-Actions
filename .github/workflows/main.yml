name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG|HONG KONG)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 10000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          function decodeBase64(str) {
              try { return Buffer.from(str.trim(), 'base64').toString('utf-8'); }
              catch (e) { return str; }
          }

          async function main() {
              console.log("🚀 启动高性能全兼容扫描...");
              let finalNodes = new Set();

              for (const link of links) {
                  const rawContent = await fetchLink(link.trim());
                  if (!rawContent) continue;

                  // 自动判断：是 YAML 还是 Base64
                  let content = rawContent.includes('proxies:') ? rawContent : decodeBase64(rawContent);
                  
                  // 统一处理：按行扫描（不再用沉重的正则）
                  const lines = content.split(/\r?\n/);
                  let currentBlock = "";
                  let isInsideProxy = false;

                  for (let line of lines) {
                      const trimmed = line.trim();

                      // 1. 处理链接格式 (vmess/vless/ss/trojan)
                      if (/^(vmess|vless|ss|trojan|hysteria2):\/\//i.test(trimmed)) {
                          if (hkRegex.test(trimmed)) finalNodes.add(`  - name: "${trimmed.split('#')[1] || 'HK-Node'}", type: v2ray-link, url: ${trimmed}`);
                          continue;
                      }

                      // 2. 处理 YAML 块 (Clash 格式)
                      if (trimmed.startsWith('-')) {
                          if (currentBlock && hkRegex.test(currentBlock) && currentBlock.includes('server:')) {
                              finalNodes.add(`  ${currentBlock}`);
                          }
                          currentBlock = trimmed;
                      } else if (currentBlock && (trimmed.includes(':') || trimmed.startsWith(' '))) {
                          currentBlock += " " + trimmed;
                      }
                  }
                  // 检查最后一个块
                  if (currentBlock && hkRegex.test(currentBlock) && currentBlock.includes('server:')) {
                      finalNodes.add(`  ${currentBlock}`);
                  }
              }

              console.log(`✅ 扫描结束，共捕获 ${finalNodes.size} 个有效香港节点`);
              const output = "proxies:\n" + Array.from(finalNodes).join('\n');
              fs.writeFileSync('hk_pure.yaml', output);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
