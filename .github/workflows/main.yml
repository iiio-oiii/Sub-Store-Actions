name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pure Subscription via Docker
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # 1. 将订阅链接写入临时文件
          printf "%s" "$SUB_LINKS" > links.txt
          
          # 2. 使用 Docker 运行，指定镜像内的 sub-store 路径
          # 注意：镜像内命令通常需要通过 node 调用或者使用其 alias
          docker run --rm \
            -v $(pwd):/opt/app \
            -w /opt/app \
            xream/sub-store \
            node /opt/sub-store/sub-store.js convert --source links.txt --script ./process.js --output hk_pure.yaml
            
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure List (Docker)"
            git push
          else
            echo "Error: hk_pure.yaml was not generated!"
            exit 1
          fi
