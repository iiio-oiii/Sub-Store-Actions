- name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          # 使用 printf 避免 echo 处理特殊字符时的转义问题
          printf "%s" "$SUB_LINKS" > links.txt
          
          # 增加调试信息：看看读取到了多少行链接
          echo "Total subscription links: $(wc -l < links.txt)"
          
          # 运行转换，增加 --verbose 模式以便报错时看到细节
          sub-store convert --source links.txt --script ./process.js --output hk_pure.yaml --verbose
