- name: Raw Append Merge
        run: |
          # 1. 先创建一个完全干净的头部
          echo "allow-left-click: true" > merged_nodes.yaml
          echo "mode: rule" >> merged_nodes.yaml
          echo "log-level: info" >> merged_nodes.yaml
          echo "unified-delay: true" >> merged_nodes.yaml
          echo "" >> merged_nodes.yaml
          echo "proxies:" >> merged_nodes.yaml

          # 2. 这里的 URL 只放最规范、确定能用的源
          urls=(
            "https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml"
            "https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml"
            "https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml"
            "https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash"
          )

          # 3. 使用 Linux 循环进行“暴力”追加提取
          for url in "${urls[@]}"; do
            echo "📡 Processing: $url"
            # 下载文件
            curl -sSL "$url" -o temp.yml
            # 只提取 proxies: 下面带有 '-' 的行及其后续缩进，并直接追加到最终文件
            # 这种方法不会破坏原始缩进，也不会产生 JS 字符串转义问题
            sed -n '/^proxies:/,$p' temp.yml | sed '1d' | sed '/^[a-zA-Z]/,$d' >> merged_nodes.yaml
          done

          # 4. 生成代理组部分（为了稳妥，这一步简单化）
          echo "" >> merged_nodes.yaml
          echo "proxy-groups:" >> merged_nodes.yaml
          echo "  - name: 🚀 自动选择" >> merged_nodes.yaml
          echo "    type: url-test" >> merged_nodes.yaml
          echo "    url: http://www.gstatic.com/generate_204" >> merged_nodes.yaml
          echo "    interval: 300" >> merged_nodes.yaml
          echo "    proxies: [DIRECT]" >> merged_nodes.yaml # 先用 DIRECT 占位，确保能下载
          echo "  - name: 🔰 手动切换" >> merged_nodes.yaml
          echo "    type: select" >> merged_nodes.yaml
          echo "    proxies: [🚀 自动选择, DIRECT]" >> merged_nodes.yaml
          echo "" >> merged_nodes.yaml
          echo "rules:" >> merged_nodes.yaml
          echo "  - MATCH,🔰 手动切换" >> merged_nodes.yaml

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 彻底移除所有可能的 \r
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Pure Raw Append Update" || exit 0
          git push
