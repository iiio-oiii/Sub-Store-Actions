name: Ultimate_YAML_Purifier

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Atomic Rebuild Logic
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function main() {
            let cleanNodes = [];
            let nodeNames = new Set();

            for (const url of urls) {
              try {
                const data = await new Promise((res, rej) => {
                  https.get(url, { timeout: 15000 }, (r) => {
                    let d = '';
                    r.on('data', (c) => d += c);
                    r.on('end', () => res(d));
                  }).on('error', rej);
                });

                if (!data) continue;
                const lines = data.split('\n');
                let inProxies = false;

                for (let line of lines) {
                  const trimmed = line.trim();
                  
                  // 1. 发现 proxies: 开始，但不搬运这一行
                  if (trimmed.toLowerCase().startsWith('proxies:')) {
                    inProxies = true;
                    continue;
                  }

                  if (inProxies) {
                    // 2. 遇到其他顶级键（非空格、非横杠开头），说明此源抓取结束
                    if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                      inProxies = false;
                      continue;
                    }

                    // 3. 核心净化：剔除重复标题，强制标准化缩进
                    if (trimmed.length > 0 && !trimmed.toLowerCase().includes('proxies:')) {
                      // 强制节点开头为 2 空格，属性为 4 空格
                      let formatted = trimmed.startsWith('-') ? '  ' + trimmed : '    ' + trimmed;
                      cleanNodes.push(formatted);

                      // 提取名字用于 proxy-groups
                      const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                      if (nameMatch) {
                        nodeNames.add(nameMatch[1].trim().replace(/^["']|["']$/g, ''));
                      }
                    }
                  }
                }
              } catch (e) { console.log(`跳过错误源: ${url}`); }
            }

            const proxyList = Array.from(nodeNames).map(n => `      - "${n}"`).join('\n');
            
            // 构造唯一的、绝对合规的 YAML 结构
            const finalYaml = [
              "allow-left-click: true",
              "mode: rule",
              "unified-delay: true",
              "",
              "proxies:", // 全文件唯一的 proxies 标题
              ...cleanNodes,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              proxyList,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              proxyList,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Auto: Atomic Structural Rebuild" || exit 0
          git push origin HEAD
