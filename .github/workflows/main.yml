name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  }).on('error', () => resolve(''));
              });
          }

          async function main() {
              console.log(`🚀 正在执行严格过滤模式...`);
              let allNodes = [];
              const hkInclude = /(香港|HK|HongKong|🇭🇰|HKG)/i;
              // 排除非节点的杂质行
              const junkExclude = /(DOMAIN|SUFFIX|KEYWORD|PROCESS|IP-CIDR|USER-AGENT)/i;

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;

                  // 核心：精准提取 YAML 节点块 (寻找以 - 开头且包含 name 和 server 的块)
                  const proxyMatch = content.match(/-[\s\S]*?(?=\n-|\n\n|\n[a-zA-Z])/g);
                  if (proxyMatch) {
                      proxyMatch.forEach(block => {
                          const b = block.trim();
                          // 必须包含香港关键字，且必须同时具备 name, server, port 才是有效节点
                          if (hkInclude.test(b) && b.includes('name:') && b.includes('server:') && b.includes('port:')) {
                              if (!junkExclude.test(b)) {
                                  // 统一格式化为 Clash 认可的缩进
                                  const clean = b.startsWith('-') ? b : `- ${b}`;
                                  allNodes.push(`  ${clean}`);
                              }
                          }
                      });
                  }
              }

              const uniqueNodes = Array.from(new Set(allNodes));
              
              // 构造标准 Clash 结构
              const finalYaml = "proxies:\n" + uniqueNodes.join('\n');
              
              console.log(`✅ 过滤完成，获得 ${uniqueNodes.length} 个高纯净度香港节点`);
              fs.writeFileSync('hk_pure.yaml', finalYaml);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
