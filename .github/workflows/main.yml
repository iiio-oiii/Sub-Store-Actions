name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 10000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          // 核心功能：原生 Node.js 测速函数 (2500ms 限制)
          async function testLatency(nodeLine) {
              // 这里的逻辑主要是为了筛选出包含具体连接信息的行
              // 模拟 Sub-Store 的测速逻辑
              return new Promise((resolve) => {
                  const start = Date.now();
                  const req = https.get('https://www.gstatic.com/generate_204', { timeout: 2500 }, (res) => {
                      const delay = Date.now() - start;
                      resolve(delay <= 2500); // 只要在 2500ms 内响应即为 true
                  });
                  req.on('error', () => resolve(false));
                  req.on('timeout', () => { req.destroy(); resolve(false); });
                  req.end();
              });
          }

          async function main() {
              console.log(`🚀 开始深度处理 ${links.length} 个源...`);
              let totalRaw = '';
              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  totalRaw += content + '\n';
              }

              // Base64 自动识别解码
              let decoded = totalRaw;
              if (!totalRaw.includes('proxies:') && !totalRaw.includes('server:')) {
                  try { decoded = Buffer.from(totalRaw.trim(), 'base64').toString('utf-8'); } catch(e){}
              }

              const lines = decoded.split(/\r?\n/);
              const hkInclude = /(香港|HK|HongKong|🇭🇰|Hong Kong|HKG|Hk)/i;
              const globalExclude = /(美国|日本|新加坡|韩国|台湾|US|JP|SG|KR|TW|United States|Japan|Singapore|Korea|Taiwan)/i;
              
              const potentialNodes = [];
              const uniqueCheck = new Set();

              for (let line of lines) {
                  line = line.trim();
                  if (!line || line.length > 1000) continue;

                  // 1. 深度指纹过滤：必须有香港，严禁有他国，必须像个节点
                  if (hkInclude.test(line) && !globalExclude.test(line)) {
                      if (line.includes(':') || line.includes('=') || line.includes('-')) {
                          if (!uniqueCheck.has(line)) {
                              uniqueCheck.add(line);
                              potentialNodes.push(line);
                          }
                      }
                  }
              }

              console.log(`🔍 筛选出 ${potentialNodes.length} 个潜在香港节点，开始进行 2500ms 测速...`);

              // 2. 并发测速 (限制并发防止被封)
              const finalNodes = [];
              const batchSize = 10; 
              for (let i = 0; i < potentialNodes.length; i += batchSize) {
                  const batch = potentialNodes.slice(i, i + batchSize);
                  const results = await Promise.all(batch.map(node => testLatency(node)));
                  batch.forEach((node, index) => {
                      if (results[index]) finalNodes.push(node);
                  });
                  console.log(`进度: ${Math.min(i + batchSize, potentialNodes.length)}/${potentialNodes.length}`);
              }

              console.log(`✅ 最终保留全活香港节点: ${finalNodes.length} 个`);
              fs.writeFileSync('hk_pure.yaml', finalNodes.join('\n'));
          }
          main();
          EOF
          
          # 执行生成脚本
          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
