name: HK_Pure_Update
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG|HONG KONG)/i;
          const excludeRegex = /(美国|US|Japan|日本|Singapore|新加坡|Taiwan|台湾|Russia|俄罗斯|🏁|未知)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 15000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log("🚀 正在对 23 个源进行工业级格式化...");
              let finalNodes = new Set();

              for (const link of links) {
                  const content = await fetchLink(link.trim());
                  if (!content) continue;

                  // 1. 统一换行符并切分节点
                  const normalized = content.replace(/\r\n/g, '\n');
                  const items = normalized.split(/\n\s*-/);
                  
                  items.forEach(item => {
                      // 2. 严格过滤非香港节点
                      if (hkRegex.test(item) && !excludeRegex.test(item)) {
                          if (item.includes('name:') && item.includes('server:')) {
                              
                              // 3. 核心修正：强行压制成单行标准对象
                              let clean = item.trim()
                                  .replace(/^[\/\-\s]+/, '')         // 剔除乱码前缀
                                  .split('proxy-groups:')[0]         // 剔除后缀干扰
                                  .replace(/\n/g, ', ')              // 换行转逗号
                                  .replace(/\s+/g, ' ')              // 压缩多余空格
                                  .trim();

                              // 4. 强制闭合括号，确保 Clash 能读懂
                              if (!clean.startsWith('{')) clean = `{${clean}}`;
                              if (!clean.endsWith('}')) clean = `${clean}}`;

                              finalNodes.add(`  - ${clean}`);
                          }
                      }
                  });
              }

              const output = "proxies:\n" + Array.from(finalNodes).join('\n');
              fs.writeFileSync('hk_pure.yaml', output);
              console.log(`✅ 搞定！已生成 ${finalNodes.size} 个标准化香港节点`);
          }
          main();
          EOF

          node generator.js

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "hk_pure.yaml" ]; then
            git add hk_pure.yaml
            git diff --quiet && git diff --staged --quiet || git commit -m "Update HK Pure"
            git push
          fi
