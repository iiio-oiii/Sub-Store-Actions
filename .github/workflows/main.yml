name: Ultimate_Standard_Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Standard Proxies Extraction
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function fetchUrl(url) {
            return new Promise((resolve) => {
              const req = https.get(url, { timeout: 15000 }, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve(data));
              });
              req.on('error', () => resolve(''));
              req.on('timeout', () => { req.destroy(); resolve(''); });
            });
          }

          async function main() {
            let allProxyLines = [];
            let proxyNames = [];

            for (const url of urls) {
              const content = await fetchUrl(url);
              if (!content || !content.includes('proxies:')) continue;

              const lines = content.split('\n');
              let isProxyArea = false;

              for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed === 'proxies:') {
                  isProxyArea = true;
                  continue;
                }

                if (isProxyArea) {
                  if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                    isProxyArea = false;
                    continue;
                  }
                  
                  // 关键点：如果是以 - 开头的节点行，确保它只缩进两个空格，保持整齐
                  if (trimmed.startsWith('-')) {
                    allProxyLines.push("  " + trimmed);
                  } else if (line.startsWith('    ')) {
                    // 保持节点内部属性（如 server, port）的缩进
                    allProxyLines.push(line);
                  }

                  const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                  if (nameMatch) {
                    let n = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                    if (n) proxyNames.push(`      - "${n}"`);
                  }
                }
              }
            }

            const uniqueNames = [...new Set(proxyNames)];
            
            // 构建文件：注意这里不加额外的 allow-left-click 等，
            // 作为一个 provider 文件，越纯净越好。
            const finalYaml = [
              "proxies:",
              ...allProxyLines,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Fix indentation for Mihomo"
            git push origin HEAD
          fi
