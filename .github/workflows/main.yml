name: Ultimate_Single_Key_Merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Strict Single-Key Extraction
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const urls = [
            'https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml',
            'https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml',
            'https://raw.githubusercontent.com/free18/v2ray/refs/heads/main/c.yaml',
            'https://raw.githubusercontent.com/ripaojiedian/freenode/refs/heads/main/clash',
            'https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg',
            'https://raw.githubusercontent.com/ccpthisbigdog/freedomchina/refs/heads/main/clab.yaml',
            'https://raw.githubusercontent.com/xyfqzy/free-nodes/main/nodes/clash.yaml',
            'https://raw.githubusercontent.com/clashv2ray-hub/clashfree/refs/heads/main/clash.yaml',
            'https://raw.githubusercontent.com/ovmvo/FreeSub/refs/heads/main/sub/permanent/mihomo.yaml'
          ];

          async function main() {
            let allNodes = [];
            let proxyNames = [];

            for (const url of urls) {
              try {
                const data = await new Promise((res, rej) => {
                  https.get(url, { timeout: 15000 }, (r) => {
                    let d = '';
                    r.on('data', (c) => d += c);
                    r.on('end', () => res(d));
                  }).on('error', rej);
                });

                if (!data) continue;
                const lines = data.split('\n');
                let inProxies = false;

                for (let line of lines) {
                  const trimmed = line.trim();
                  
                  // 1. 发现源文件中的 proxies: 标记，仅开启抓取开关，绝对不搬运这一行
                  if (trimmed.toLowerCase().startsWith('proxies:')) {
                    inProxies = true;
                    continue;
                  }

                  if (inProxies) {
                    // 2. 判定结束：遇到新的顶级配置（非空、非空格开头、非横杠开头）
                    if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('-')) {
                      inProxies = false;
                      continue;
                    }

                    // 3. 核心过滤：即使在抓取区，如果行内包含 proxies: 字样（防止源文件嵌套），也剔除
                    if (trimmed.length > 0 && !trimmed.toLowerCase().includes('proxies:')) {
                      allNodes.push(line);

                      // 提取节点名用于生成 proxy-groups
                      const nameMatch = line.match(/name:\s*["']?([^"'\n,{}]+)["']?/);
                      if (nameMatch) {
                        let n = nameMatch[1].trim().replace(/^["']|["']$/g, '');
                        if (n) proxyNames.push(`      - "${n}"`);
                      }
                    }
                  }
                }
                console.log(`✅ ${url} 处理完成`);
              } catch (e) { console.log(`❌ 跳过失败源: ${url}`); }
            }

            const uniqueNames = [...new Set(proxyNames)];
            
            // 构造最终 YAML，确保 proxies: 全局唯一
            const finalYaml = [
              "allow-left-click: true",
              "mode: rule",
              "proxies:",  // 这是全文件唯一的 proxies 标题
              ...allNodes,
              "",
              "proxy-groups:",
              "  - name: 🚀 自动选择",
              "    type: url-test",
              "    url: http://www.gstatic.com/generate_204",
              "    interval: 300",
              "    proxies:",
              ...uniqueNames,
              "",
              "  - name: 🔰 手动切换",
              "    type: select",
              "    proxies:",
              "      - 🚀 自动选择",
              "      - DIRECT",
              ...uniqueNames,
              "",
              "rules:",
              "  - MATCH,🔰 手动切换"
            ].join('\n');

            fs.writeFileSync('merged_nodes.yaml', finalYaml);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/\r$//' merged_nodes.yaml
          git add merged_nodes.yaml
          git commit -m "Fix: Enforce single proxies key" || exit 0
          git push origin HEAD
