name: Generate Pure HK Subscription

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate Pure Subscription
        env:
          SUB_LINKS: ${{ secrets.SUB_LINKS }}
        run: |
          cat << 'EOF' > generator.js
          const fs = require('fs');
          const https = require('https');

          const links = process.env.SUB_LINKS.split('\n').filter(l => l.trim().startsWith('http'));
          const hkRegex = /(香港|HK|HongKong|🇭🇰|HKG)/i;
          const excludeRegex = /(美国|US|Japan|日本|Taiwan|台湾|Singapore|新加坡|Korea|韩国|🏁)/i;

          async function fetchLink(url) {
              return new Promise((resolve) => {
                  const req = https.get(url, { timeout: 20000 }, (res) => {
                      let data = '';
                      res.on('data', (chunk) => data += chunk);
                      res.on('end', () => resolve(data));
                  });
                  req.on('error', () => resolve(''));
                  req.end();
              });
          }

          async function main() {
              console.log("🚀 开始深度清洗 23 个订阅源...");
              let finalNodes = [];
              let nodeNames = [];

              for (const link of links) {
                  let content = await fetchLink(link.trim());
                  if (!content) continue;
                  
                  // 处理 Base64
                  if (!content.includes('server:')) {
                      try { content = Buffer.from(content, 'base64').toString(); } catch(e) {}
                  }

                  const blocks = content.replace(/\r\n/g, '\n').split(/\n\s*-/);
                  
                  blocks.forEach(block => {
                      if (hkRegex.test(block) && !excludeRegex.test(block) && block.includes('server:')) {
                          const fields = ['name', 'server', 'port', 'type', 'uuid', 'password', 'cipher', 'alterId', 'tls', 'sni', 'network', 'ws-opts', 'headers', 'skip-cert-verify', 'path'];
                          let nodeObj = {};

                          fields.forEach(field => {
                              const regex = new RegExp(`${field}:\\s*({.*?}|".*?"|'.*?'|[^,\\n\\}]+)`);
                              const match = block.match(regex);
                              if (match) {
                                  nodeObj[field] = match[1].trim().replace(/^["']|["']$/g, '');
                              }
                          });

                          if (nodeObj.name && nodeObj.server) {
                              let kv = Object.entries(nodeObj).map(([k, v]) => {
                                  if (k === 'ws-opts' || k === 'headers') return `${k}: {${v.replace(/[\{\}]/g, '')}}`;
                                  return `${k}: ${v}`;
                              }).join(', ');
                              
                              const nodeLine = `  - {${kv}}`;
                              const nodeName = nodeObj.name;
                              
                              finalNodes.push(nodeLine);
                              nodeNames.push(`      - "${nodeName}"`);
                          }
                      }
                  });
              }

              const uniqueNodes = Array.from(new Set(finalNodes));
              const uniqueNames = Array.from(new Set(nodeNames));

              // 构造标准完整的 YAML
              const config = [
                "port: 7890",
                "socks-port: 7891",
                "allow-left-click: true",
                "mode: rule",
                "log-level: info",
                "external-controller: 127.0.0.1:9090",
                "",
                "proxies:",
                ...uniqueNodes,
                "",
                "proxy-groups:",
                "  - name: 🚀 自动选择最快香港",
                "    type: url-test",
                "    url: http://www.gstatic.com/generate_204",
                "    interval: 300",
                "    proxies:",
                ...uniqueNames,
                "",
                "  - name: 🔰 手动选择节点",
                "    type: select",
                "    proxies:",
                "      - 🚀 自动选择最快香港",
                ...uniqueNames,
                "",
                "rules:",
                "  - DOMAIN-SUFFIX,interactivebrokers.com,🚀 自动选择最快香港",
                "  - DOMAIN-SUFFIX,google.com,🔰 手动选择节点",
                "  - MATCH,🔰 手动选择节点"
              ].join('\n');

              fs.writeFileSync('hk_pure.yaml', config);
              console.log(`✅ 搞定！已从 23 个源中提取并格式化了 ${uniqueNodes.length} 个纯香港节点。`);
          }
          main();
          EOF
          node generator.js

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add hk_pure.yaml
          git commit -m "Update HK Pure Subscription" || exit 0
          git push
